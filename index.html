<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; font-family: sans-serif; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }

  #header {
    padding: 14px 20px 10px;
    background: #0f1117;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    z-index: 1000;
  }
  #header h1 { font-size: 18px; font-weight: 900; letter-spacing: 2px; white-space: nowrap; }

  .ctrl-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .ctrl-label { font-size: 11px; color: #666; white-space: nowrap; }

  .layer-btn {
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid #333;
    background: #1a1a2e;
    color: #aaa;
    transition: all .15s;
  }
  .layer-btn.active {
    border-color: #f0c040;
    background: #f0c040;
    color: #111;
  }

  .toggle-btn {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid #333;
    background: transparent;
    color: #888;
    transition: all .15s;
  }
  .toggle-btn.active {
    border-color: #4fc3f7;
    background: #4fc3f7;
    color: #111;
    font-weight: 700;
  }

  #map { flex: 1; }

  #legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    background: rgba(15,17,23,0.92);
    border: 1px solid #2a2d3e;
    border-radius: 10px;
    padding: 12px 16px;
    z-index: 1000;
    min-width: 200px;
    backdrop-filter: blur(6px);
  }
  #legend h3 { font-size: 10px; color: #666; letter-spacing: 1px; margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .leg-line { width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0; }
  .leg-text { font-size: 11px; color: #aaa; }

  .leaflet-popup-content-wrapper {
    background: #1a1d2e !important;
    border: 1px solid #444 !important;
    border-radius: 8px !important;
    color: #f0f0f0 !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-tip { background: #1a1d2e !important; }
  .leaflet-popup-content { margin: 12px 14px !important; }
  .popup-name { font-size: 14px; font-weight: 700; color: #f0c040; margin-bottom: 6px; }
  .popup-row { font-size: 12px; color: #ccc; margin-bottom: 3px; }
  .popup-row span { color: #fff; font-weight: 600; }
</style>
</head>
<body>

<div id="header">
  <h1>🗺 東京 地域データマップ</h1>
  <div class="ctrl-group">

    <button class="layer-btn" onclick="setLayer('鉄道密度')">鉄道密度</button>
  </div>
  <div class="ctrl-group">

let polygonLayer = L.layerGroup();
let railLayer   = L.layerGroup().addTo(map);
let riverLayer  = L.layerGroup();
let portLayer   = L.layerGroup();
let icLayer     = L.layerGroup();
let showRail = true, showIC = false, showRiver = false, showPort = false;

function altColor(alt) {
  if (alt >= 200) return "#5d4037";
  if (alt >= 80)  return "#8d6e63";
  if (alt >= 40)  return "#bcaaa4";
  if (alt >= 10)  return "#81c784";
  return "#1565c0";
}
function railColor(rail) {
  if (rail >= 9) return "#f44336";
  if (rail >= 7) return "#ff9800";
  if (rail >= 5) return "#4caf50";
  return "#78909c";
}

function drawCircles() {
  circleLayer.clearLayers();
  polygonLayer.clearLayers();
  WARDS.forEach(d => {
    let color, radius;
    if (currentLayer === "人口分布") {
      color  = d.type === "23区" ? "#e53935" : "#1e88e5";
      radius = Math.sqrt(d.pop / 928000) * 1800;
      const circle = L.circle([d.lat, d.lng], {
        radius,
        color:       "rgba(255,255,255,0.3)",
        weight:      1,
        fillColor:   color,
        fillOpacity: 0.72,
      });
      circle.bindPopup(`
        <div class="popup-name">${d.name}</div>
        <div class="popup-row">人口：<span>${d.pop.toLocaleString()}人</span></div>
        <div class="popup-row">標高：<span>約${d.alt}m</span></div>
        <div class="popup-row">鉄道スコア：<span>${d.rail}/10</span></div>
        <div class="popup-row">エリア：<span>${d.type}</span></div>
        <div class="popup-row">合併：<span>${d.merged}</span></div>
        <div class="popup-row">地形：<span>${d.terrain}</span></div>
        <div class="popup-row">主な河川：<span>${d.river}</span></div>
      `, { maxWidth: 250 });
      circleLayer.addLayer(circle);
    } else if (currentLayer === "地形標高") {
      color = altColor(d.alt);
      const polygon = L.polygon(d.bounds, {
        color:       "rgba(255,255,255,0.5)",
        weight:      1,
        fillColor:   color,
        fillOpacity: 0.8,
      });
      polygon.bindPopup(`
        <div class="popup-name">${d.name}</div>
        <div class="popup-row">標高：<span>約${d.alt}m</span></div>
        <div class="popup-row">地形：<span>${d.terrain}</span></div>
        <div class="popup-row">主な河川：<span>${d.river}</span></div>
        <div class="popup-row">人口：<span>${d.pop.toLocaleString()}人</span></div>
        <div class="popup-row">エリア：<span>${d.type}</span></div>
      `, { maxWidth: 250 });
      polygonLayer.addLayer(polygon);
    } else {
      color  = railColor(d.rail);
      radius = d.rail * 120;
      const circle = L.circle([d.lat, d.lng], {
        radius,
        color:       "rgba(255,255,255,0.3)",
        weight:      1,
        fillColor:   color,
        fillOpacity: 0.72,
      });
      circle.bindPopup(`
        <div class="popup-name">${d.name}</div>
        <div class="popup-row">人口：<span>${d.pop.toLocaleString()}人</span></div>
        <div class="popup-row">標高：<span>約${d.alt}m</span></div>
        <div class="popup-row">鉄道スコア：<span>${d.rail}/10</span></div>
        <div class="popup-row">エリア：<span>${d.type}</span></div>
        <div class="popup-row">合併：<span>${d.merged}</span></div>
        <div class="popup-row">地形：<span>${d.terrain}</span></div>
        <div class="popup-row">主な河川：<span>${d.river}</span></div>
      `, { maxWidth: 250 });
      circleLayer.addLayer(circle);
    }
  });
  if (currentLayer === "地形標高") {
    map.addLayer(polygonLayer);
  } else {
    map.removeLayer(polygonLayer);
  }
}

function drawRail() {
  railLayer.clearLayers();
  RAIL_LINES.forEach(line => {
    const pl = L.polyline(line.latlngs, {
      color:  line.color,
      weight: line.weight,
      opacity: 0.8,
      smoothFactor: 1,
    });
    pl.bindTooltip(line.name, { sticky: true, className: 'leaflet-tooltip' });
    railLayer.addLayer(pl);
  });
}

function drawRiver() {
  riverLayer.clearLayers();
  RIVERS.forEach(river => {
    const pl = L.polyline(river.latlngs, {
      color:  river.color,
      weight: river.weight,
      opacity: 0.7,
      smoothFactor: 1,
    });
    pl.bindTooltip(river.name, { sticky: true, className: 'leaflet-tooltip' });
    riverLayer.addLayer(pl);
  });
}

function drawPort() {
  portLayer.clearLayers();
  PORTS.forEach(port => {
    const icon = L.divIcon({
      html: `<div style="font-size:20px;">🚢</div>`,
      iconSize: [20, 20],
      iconAnchor: [10, 10],
      className: '',
    });
    const marker = L.marker([port.lat, port.lng], { icon });
    marker.bindPopup(`
      <div class="popup-name">🚢 ${port.name}</div>
      <div class="popup-row">種類：<span>${port.type}</span></div>
      <div class="popup-row">役割：<span>${port.role}</span></div>
    `, { maxWidth: 180 });
    portLayer.addLayer(marker);
  });
}

function drawIC() {
  icLayer.clearLayers();
  ICS.forEach(ic => {
    const total = ic.commercial + ic.danchi + ic.logistics;
    const size  = 8 + total * 0.8;
    const icon  = L.divIcon({
      html: `<div style="
        width:0;height:0;
        border-left:${size}px solid transparent;
        border-right:${size}px solid transparent;
        border-bottom:${size*1.7}px solid #f0c040;
        filter: drop-shadow(0 0 4px #f0c040aa);
      "></div>`,
      iconSize: [size*2, size*1.7],
      iconAnchor: [size, size*1.7],
      className: '',
    });
    const marker = L.marker([ic.lat, ic.lng], { icon });
    marker.bindPopup(`
      <div class="popup-name">🔺 ${ic.name}</div>
      <div class="popup-row">路線：<span>${ic.road}</span></div>
      <div class="popup-row">商業施設：<span>${ic.commercial}件</span></div>
      <div class="popup-row">団地・住宅：<span>${ic.danchi}件</span></div>
      <div class="popup-row">物流・工場：<span>${ic.logistics}件</span></div>
    `, { maxWidth: 180 });
    icLayer.addLayer(marker);
  });
}

function setLayer(name) {
  currentLayer = name;
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  drawCircles();
  updateLegend();
}

function toggleRail() {
  showRail = !showRail;
  document.getElementById('btn-rail').classList.toggle('active', showRail);
  if (showRail) map.addLayer(railLayer); else map.removeLayer(railLayer);
}

function toggleIC() {
  showIC = !showIC;
  document.getElementById('btn-ic').classList.toggle('active', showIC);
  if (showIC) { icLayer.addTo(map); } else { map.removeLayer(icLayer); }
}

function toggleRiver() {
  showRiver = !showRiver;
  document.getElementById('btn-river').classList.toggle('active', showRiver);
  if (showRiver) { riverLayer.addTo(map); } else { map.removeLayer(riverLayer); }
}

function togglePort() {
  showPort = !showPort;
  document.getElementById('btn-port').classList.toggle('active', showPort);
  if (showPort) { portLayer.addTo(map); } else { map.removeLayer(portLayer); }
}

function updateLegend() {
  const el = document.getElementById('legend');
  let html = '<h3>LEGEND</h3>';
  if (currentLayer === "人口分布") {
    html += `
      <div class="leg-item"><div class="leg-dot" style="background:#e53935"></div><span class="leg-text">23区（円の大きさ＝人口）</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:#1e88e5"></div><span class="leg-text">多摩地区</span></div>
    `;
  } else if (currentLayer === "地形標高") {
    html += `
      <div class="leg-item"><div class="leg-dot" style="background:#5d4037"></div><span class="leg-text">200m+ 山地</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:#8d6e63"></div><span class="leg-text">80-200m 丘陵</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:#bcaaa4"></div><span class="leg-text">40-80m 台地</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:#81c784"></div><span class="leg-text">10-40m 緑地</span></div>
      <div class="leg-item"><div class="leg-dot" style="background:#1565c0"></div><span class="leg-text">〜10m 低地</span></div>
      <div class="leg-text" style="margin-top:8px;font-size:10px;color:#888;">※ 各区の境界をポリゴンで表示</div>
    `;
  } else {
    [["主要ターミナル(9+)","#f44336"],["中核駅(7-8)","#ff9800"],["地域駅(5-6)","#4caf50"],["少ない(〜4)","#78909c"]].forEach(([l,c]) => {
      html += `<div class="leg-item"><div class="leg-dot" style="background:${c}"></div><span class="leg-text">${l}</span></div>`;
    });
  }
  html += '<div style="margin-top:8px;border-top:1px solid #333;padding-top:8px">';
  RAIL_LINES.forEach(l => {
    html += `<div class="leg-item"><div class="leg-line" style="background:${l.color}"></div><span class="leg-text" style="font-size:10px">${l.name}</span></div>`;
  });
  html += '</div>';
  html += '<div style="margin-top:8px;border-top:1px solid #333;padding-top:8px">';
  RIVERS.forEach(r => {
    html += `<div class="leg-item"><div class="leg-line" style="background:${r.color}"></div><span class="leg-text" style="font-size:10px">${r.name}</span></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// 初期描画
drawCircles();
drawRail();
drawRiver();
drawPort();
drawIC();
updateLegend();
</script>
</body>
</html>
